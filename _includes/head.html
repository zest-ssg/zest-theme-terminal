<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.url == '/' %}{{ site.title }}{% else %}{{ page.title }} :: {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site.title | default('Terminal')) }}" />
  <link rel="canonical" href="{{ page.url }}" />
  <meta property="og:type" content="{% if page.url == '/' %}website{% else %}article{% endif %}" />
  <meta property="og:title" content="{% if page.url == '/' %}{{ site.title }}{% else %}{{ page.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.url == '/' %}{{ site.params.subtitle | default(site.description) }}{% else %}{{ page.description | default(site.description) }}{% endif %}" />
  <meta property="og:url" content="{{ page.url }}" />
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:image" content="{% if page.cover %}{{ page.cover }}{% else %}/assets/og-image.png{% endif %}" />
  <meta name="twitter:card" content="summary" />
  <meta name="generator" content="Zest" />
  <link rel="alternate" type="application/rss+xml" href="/rss.xml" title="{{ site.title }}" />
  <link rel="shortcut icon" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/terminal.css">
  <link rel="stylesheet" href="/assets/css/header.css">
  <link rel="stylesheet" href="/assets/css/post.css">
  <link rel="stylesheet" href="/assets/css/footer.css">
  <link rel="stylesheet" href="/assets/css/buttons.css">
  <link rel="stylesheet" href="/assets/css/menu.css">
  <link rel="stylesheet" href="/assets/css/pagination.css">
  <link rel="stylesheet" href="/assets/css/terms.css">
  <link rel="stylesheet" href="/assets/css/code.css">
  <link rel="stylesheet" href="/assets/css/syntax.css">
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <link rel="stylesheet" href="/assets/css/gist.css">
</head>
